# yaml-language-server: $schema=https://kimbia.mwco.app/schema.json
---
tasks:
  - name: fmt
    description: Format the code
    commands:
      - platforms:
          - linux
          - mac
        run:
          - go fmt ./...
  - name: build-linux-debug
    description: Build the project
    commands:
      - platforms:
          - linux
        env:
          - key: VERSION
            value: 0.0.0-debug-$(date +%Y%m%d%H%M%S)
          - key: PLATFORM
            value: linux-debug
        run:
          - ./scripts/build.sh
